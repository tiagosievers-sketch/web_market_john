services:
    2easy-ede-web-backend:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: 2easy-ede-web-backend
        hostname: 2easy-ede-web-backend
        volumes:
            - ./:/var/www/html
        ports:
            - '27002:80'
        expose:
            - 27002
        restart: unless-stopped
        networks:
            - ede-backend-net
        depends_on:
            - 2easy-ede-redis
    2easy-ede-redis:
        image: redis:alpine
        container_name: 2easy-ede-redis
        restart: unless-stopped
        command: redis-server --requirepass ${REDIS_PASSWORD}
        ports:
            - "6385:6379"
        networks:
            - ede-backend-net
        volumes:
            - ede-redis-data:/data
volumes:
    ede-redis-data:
networks:
    ede-backend-net:
        driver: bridge
